services:
  leadgen-mcp:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: leadgen-mcp:latest
    container_name: leadgen-mcp
    ports:
      - "8080:8080"
    restart: unless-stopped
    # Secrets from repo-local tokens.env (git-ignored). Referenced by the
    # OpenRouter image-gen module (OPENROUTER_API_KEY) and any other env-based
    # integrations. Optional at build time — missing file fails startup, so
    # tokens.env must exist before `docker compose up`.
    env_file:
      - ./tokens.env
    volumes:
      # Data directory — SQLite DB + JSON seed live here on the host.
      # On first start with empty DB, server loads server/data/filter_values.json.
      # After every upsert, server rewrites filter_values.json so it stays in sync.
      - ./server/data:/app/data
      # Config is read-only inside the container.
      # NOTE: create server/config.yaml before first run:
      #   cp server/config.yaml.example server/config.yaml
      # then fill in your tokens.
      - ./server/config.yaml:/app/config.yaml:ro
      # Generated RSYA banner previews (R6.5). Shared with the host so the
      # user / agent can inspect images before approving them for upload.
      - ./docs/campaign_previews:/app/previews
